<!DOCTYPE html>

<title>MoeDichTruyen</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}
header {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo {
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}
.search input {
  padding:8px;
  border-radius:5px;
  border:none;
}
.container {
  padding:20px;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}
.card {
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
}
.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}
.card .info {
  padding:10px;
}
a {
  text-decoration:none;
  color:white;
}
.footer {
  text-align:center;
  padding:20px;
  background:#020617;
  margin-top:30px;
}
</style>
</head>

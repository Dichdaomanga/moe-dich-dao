<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moe Dịch Dạo</title>

<style>
body {
  background:#0d0d0d;
  color:white;
  font-family:Arial;
  margin:0;
}

/* Header */
.header {
  background:#ff6a00;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

/* Grid truyện */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

/* Card */
.card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* Ảnh */
.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

/* Title */
.card p {
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
📖 Moe Dịch Dạo
</div>

<div class="grid">

<a href="chap1.html" class="card">
  <img src="1.png">
  <p>Thiếu Nữ Ngủ Đông</p>
</a>

</div>

</body>
</html>
